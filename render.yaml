services:
  - type: web
    name: cognitive-coach-backend
    env: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
        description: "API key for Google Gemini (optional, runs in sandbox mode if empty)"
      - key: JWT_SECRET
        generateValue: true
        description: "JWT Secret for signing/verifying backend auth tokens"
      - key: SUPABASE_JWT_SECRET
        sync: false
        description: "Supabase project JWT secret to verify client logins"
      - key: DATABASE_URL
        sync: false
        description: "PostgreSQL Database Connection URL (falls back to local SQLite if empty)"
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
