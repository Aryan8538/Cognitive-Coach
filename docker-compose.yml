version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend-uploads:/app/uploads
      - sqlite-db:/app/db
    environment:
      - DATABASE_URL=sqlite:////app/db/coach.db
      # - GEMINI_API_KEY=your_actual_key_here
      # - ALLOWED_ORIGINS=http://localhost:3000
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: always

volumes:
  backend-uploads:
  sqlite-db:
